<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jubilee Learn</title>
    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #2C3E50;
            --bg-color: #F4F7F6;
            --text-color: #333;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .screen {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Header */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px;
            cursor: pointer;
        }

        /* Logout Button */
        .logout-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            border-radius: 5px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Splash Screen */
        #splash-screen {
            background-color: #FFFFFF;
            justify-content: center;
            align-items: center;
        }

        #splash-screen img {
            width: 220px;
            height: 220px;
            border-radius: 20px;
            object-fit: contain;
        }

        /* Login Screen */
        #login-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            display: block;
            margin: 0 auto 20px auto;
            object-fit: contain;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--secondary-color);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 1.1rem;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            opacity: 0.8;
        }

        .contact-support {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #666;
        }

        .contact-support strong {
            color: var(--primary-color);
        }

        /* Dashboard Screen */
        .container {
            padding: 20px;
            flex: 1;
        }

        .welcome-msg {
            font-size: 1.5rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #666;
            margin-top: 10px;
        }

        .grid-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 5px solid var(--primary-color);
        }

        .card::after {
            content: "\203A";
            font-size: 1.8rem;
            color: #aaa;
        }

        /* Assignment UI Elements */
        .assignment-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 4px solid #E67E22;
        }

        .assignment-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: var(--secondary-color);
        }

        .assignment-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            background-color: var(--primary-color);
            color: white;
        }

        .action-btn.secondary {
            background-color: #eee;
            color: #333;
        }

        .action-btn:active {
            opacity: 0.8;
        }

        /* Class Details Screen */
        .class-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .class-icon {
            width: 40px;
            height: 40px;
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
        }

        /* Video Player Screen */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            width: 100%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-details {
            padding: 20px;
        }

        .video-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
    </style>
</head>

        // --- USER ACCESS ---

        const usersData = {};

        function normalizeEmail(email) {
            let normalized = email.trim().toLowerCase();
            // Remove leading @ if present (some entries have "@email@gmail.com")
            if (normalized.startsWith('@')) normalized = normalized.substring(1);
            // Remove spaces inside the email
            normalized = normalized.replace(/\s+/g, '');
            if (!normalized.includes('@')) normalized += '@gmail.com';
            // Fix common typos
            normalized = normalized.replace(/@gamil\.com$/i, '@gmail.com')
                                   .replace(/@gmai\.com$/i, '@gmail.com')
                                   .replace(/@gmail\.co$/i, '@gmail.com')
                                   .replace(/@gmail\.con$/i, '@gmail.com')
                                   .replace(/@gmail\.ckm$/i, '@gmail.com')
                                   .replace(/@gmail\.c$/i, '@gmail.com')
                                   .replace(/@gamail\.com$/i, '@gmail.com')
                                   .replace(/@gmail\.\s*com$/i, '@gmail.com')
                                   .replace(/@gmail\.\s*cv\s*om$/i, '@gmail.com');
            return normalized;
        }

        function getSemesterKey(batchStr) {
            batchStr = batchStr.toLowerCase();
            if (batchStr.includes("first")) return "BSc first semester";
            if (batchStr.includes("third")) return "BSc third semester";
            if (batchStr.includes("fifth")) return "BSc fifth semester";
            if (batchStr.includes("seventh")) return "BSc seventh semester";
            return "";
        }

        // Proper CSV parser that handles quoted fields correctly
        function parseCSVLine(line) {
            const fields = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuotes) {
                    if (ch === '"') {
                        if (i + 1 < line.length && line[i + 1] === '"') {
                            current += '"';
                            i++; // skip escaped quote
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        fields.push(current.trim());
                        current = '';
                    } else {
                        current += ch;
                    }
                }
            }
            fields.push(current.trim());
            return fields;
        }

        function loadUsersFromCSV(csv) {
            const lines = csv.split('\n');
            const seenEmails = new Set();
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const fields = parseCSVLine(line);
                if (fields.length < 4) continue;
                
                let name = fields[1].trim();
                let email = fields[2].trim();
                let batch = fields[3].trim();
                
                email = normalizeEmail(email);
                
                // Skip if we've already processed this email (dedup)
                if (seenEmails.has(email)) continue;
                seenEmails.add(email);
                
                // Extract first name for greeting & password
                let firstName = name.split(/[\s.]+/)[0].replace(/[^a-zA-Z]/g, '');
                if (!firstName) firstName = "Student";
                firstName = firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase();
                
                let generatedPass = firstName + "123";
                let semKey = getSemesterKey(batch);
                
                usersData[email] = { name: firstName, pass: generatedPass, role: "student", semester: semKey };
                
                // Add to mailing list for faculty
                if (semKey && semesterEmails[semKey]) {
                    if (!semesterEmails[semKey].includes(email)) {
                        semesterEmails[semKey].push(email);
                    }
                }
            }
        }

            document.getElementById('playing-class-title').innerText = classInfo.title + ' (' + classInfo.instructor + ')';
            document.getElementById('youtube-player').src = videoUrl;
        }

        function goBackToDashboard() {
            history.back();
        }

        function goBackToCourse() {
            history.back();
        }

        window.addEventListener('popstate', (event) => {
            document.getElementById('youtube-player').src = ""; 
            const state = event.state ? event.state.page : '';

            if (state === 'video') {
                showScreen('video-screen');
            } else if (state === 'course') {
                showScreen('course-screen');
            } else if (state === 'dashboard') {
                showScreen('dashboard-screen');
            } else {
                if (localStorage.getItem('isLoggedIn') === 'true') {
                    showScreen('dashboard-screen');
                } else {
                    showScreen('login-screen');
                }
            }
        });
    </script>
</body>
</html>
