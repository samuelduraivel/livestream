<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jubilee Learn</title>
    <style>
        /* CSS Variables & Reset */
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #2C3E50;
            --bg-color: #F4F7F6;
            --text-color: #333;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .screen {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Header */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px;
            cursor: pointer;
        }

        /* Logout Button */
        .logout-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            border-radius: 5px;
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Splash Screen */
        #splash-screen {
            background-color: #FFFFFF;
            justify-content: center;
            align-items: center;
        }

        #splash-screen img {
            width: 220px;
            height: 220px;
            border-radius: 20px;
            object-fit: contain;
        }

        /* Login Screen */
        #login-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            display: block;
            margin: 0 auto 20px auto;
            object-fit: contain;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--secondary-color);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            opacity: 0.8;
        }

        .create-account {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #666;
        }

        .create-account a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        /* Dashboard Screen */
        .container {
            padding: 20px;
            flex: 1;
        }

        .welcome-msg {
            font-size: 1.5rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #666;
            margin-top: 10px;
        }

        .grid-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 5px solid var(--primary-color);
        }

        .card::after {
            content: "›";
            font-size: 1.8rem;
            color: #aaa;
        }

        /* Class Details Screen */
        .class-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .class-icon {
            width: 40px;
            height: 40px;
            background: rgba(74, 144, 226, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
        }

        /* Video Player Screen */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            width: 100%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-details {
            padding: 20px;
        }

        .video-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="splash-screen" class="screen">
        <img src="app_icon.png" alt="App Icon" onerror="this.style.display='none'">
    </div>

    <div id="login-screen" class="screen hidden">
        <div class="login-card">
            <img src="app_icon.png" alt="App Icon" class="login-logo" onerror="this.style.display='none'">
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            
            <p id="login-error" style="color: red; text-align: center; margin-top: 15px; font-size: 0.9rem; display: none;">Invalid credentials!</p>
            
            <p class="create-account">Don't have an account? <a href="#" onclick="alert('This is a dummy account creation page.'); return false;">Create one</a></p>
        </div>
    </div>

    <div id="dashboard-screen" class="screen hidden">
        <header>
            Jubilee Learn
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>
        <div class="container">
            <div class="welcome-msg" id="user-greeting">Welcome,</div>

            <div class="section-title">Live Classes Available</div>
            <div class="grid-list">
                <div class="card" onclick="openCourse('BSc first semester')">BSc first semester</div>
                <div class="card" onclick="openCourse('BSc third semester')">BSc third semester</div>
                <div class="card" onclick="openCourse('BSc fifth semester')">BSc fifth semester</div>
                <div class="card" onclick="openCourse('BSc seventh semester')">BSc seventh semester</div>
            </div>
        </div>
    </div>

    <div id="course-screen" class="screen hidden">
        <header>
            <button class="back-btn" onclick="goBackToDashboard()">← Back</button>
            <span id="course-title">Course Name</span>
        </header>
        <div class="container" id="class-list">
            </div>
    </div>

    <div id="video-screen" class="screen hidden">
        <header>
            <button class="back-btn" onclick="goBackToCourse()">← Back</button>
            <span>Live Class</span>
        </header>
        <div class="video-wrapper">
            <iframe 
    id="youtube-player" 
    src="" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    referrerpolicy="strict-origin-when-cross-origin" 
    allowfullscreen>
</iframe>
        </div>
        <div class="video-details">
            <h2 class="video-title" id="playing-class-title">Live Class</h2>
            <p style="color: #666;">Streaming live. Please interact in the chat below.</p>
        </div>
    </div>

    <script>
        // --- DATA LAYER ---
        const courseData = {
            "BSc first semester": [
                { title: "Applied Physiology", time: "09:00 AM - 11:00 AM", instructor: "Dr. Kavya", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Applied ANA", time: "11:00 AM - 12:00 PM", instructor: "Mrs. Divia Acha Jacob", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "NF-I Viva (Admission)", time: "12:00 PM - 01:00 PM", instructor: "Mrs. Shilpa .L", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Applied ANA", time: "02:00 PM - 03:00 PM", instructor: "Mrs. Divia Acha Jacob", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "NF-I Viva (Admission)", time: "03:00 PM - 04:00 PM", instructor: "Mrs. Shilpa .L", url: "https://meet.google.com/giy-kvkm-jac" }
            ],
            "BSc third semester": [
                { title: "Pharmacology-I", time: "09:00 AM - 11:00 AM", instructor: "Mrs. Divia", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Adult Health Nursing - I VIVA", time: "11:00 AM - 12:00 PM", instructor: "Mr. Abhiram", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Adult Health Nursing - I VIVA", time: "02:00 PM - 03:00 PM", instructor: "Ms. Roshini", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Adult Health Nursing - I VIVA", time: "03:00 PM - 04:00 PM", instructor: "Ms. Asline", url: "https://meet.google.com/giy-kvkm-jac" }
            ],
            "BSc fifth semester": [
                { title: "CHN I", time: "09:00 AM - 10:00 AM", instructor: "Ms. Bineeta", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "MHN I", time: "10:00 AM - 11:00 AM", instructor: "Ms. Feeba", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Forensic Nursing", time: "11:00 AM - 12:00 PM", instructor: "Ms. Asline", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "MHN I", time: "12:00 PM - 01:00 PM", instructor: "Mr. Sagar", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "COHN", time: "02:00 PM - 03:00 PM", instructor: "Ms. Feeba", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "COHN", time: "03:00 PM - 04:00 PM", instructor: "Mr. Sagar", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "CHN I", time: "04:00 PM - 05:00 PM", instructor: "Ms. Bineeta", url: "https://meet.google.com/giy-kvkm-jac" }
            ],
            "BSc seventh semester": [
                { title: "COHN II", time: "09:00 AM - 10:00 AM", instructor: "Mrs. Geetha S T", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Midwifery II", time: "10:00 AM - 11:00 AM", instructor: "Mrs. Sangeetha", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Nursing Research", time: "11:00 AM - 12:00 PM", instructor: "Mrs. Manimegalai.S", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "COHN II", time: "12:00 PM - 01:00 PM", instructor: "Mrs. Geetha S T", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Midwifery II", time: "02:00 PM - 03:00 PM", instructor: "Mrs. Manimegalai", url: "https://meet.google.com/giy-kvkm-jac" },
                { title: "Midwifery II", time: "03:00 PM - 04:00 PM", instructor: "Mrs. Sangeetha", url: "https://meet.google.com/giy-kvkm-jac" }
            ]
        };

        let currentCourse = "";

        // Application Initialization
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                
                if (localStorage.getItem('isLoggedIn') === 'true') {
                    const savedEmail = localStorage.getItem('userEmail');
                    setGreeting(savedEmail);
                    history.replaceState({ page: 'dashboard' }, '', '#dashboard');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                } else {
                    history.replaceState({ page: 'login' }, '', '#login');
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            }, 3000);
        });

        // Greeting Logic
        function setGreeting(email) {
            const name = email === "minoshvcn@gmail.com" ? "Minosh" : "Dennis";
            document.getElementById('user-greeting').innerText = `Welcome ${name},`;
        }

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            if ((email === "minoshvcn@gmail.com" && password === "Minosh1987") || 
                (email === "dennisvcn@gmail.com" && password === "Dennis 2026")) {
                
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                
                setGreeting(email);
                
                // Set history state for device back alignment
                history.pushState({ page: 'dashboard' }, '', '#dashboard');
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                errorMsg.style.display = 'none';
            } else {
                errorMsg.style.display = 'block';
            }
        });

        // Logout Logic
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            
            document.getElementById('email').value = "";
            document.getElementById('password').value = "";
            document.getElementById('youtube-player').src = ""; 
            
            // Set history state to prevent user from going "back" into the app after logout
            history.pushState({ page: 'login' }, '', '#login');
            
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('course-screen').classList.add('hidden');
            document.getElementById('video-screen').classList.add('hidden');
            
            document.getElementById('login-screen').classList.remove('hidden');
        }

        // --- NAVIGATION LOGIC ---

        function showScreen(screenId) {
            ['login-screen', 'dashboard-screen', 'course-screen', 'video-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        // Dashboard -> Course
        function openCourse(courseName) {
            currentCourse = courseName;
            
            // Push into Browser History stack
            history.pushState({ page: 'course' }, '', '#course');
            
            showScreen('course-screen');
            document.getElementById('course-title').innerText = courseName;

            const classListContainer = document.getElementById('class-list');
            classListContainer.innerHTML = ""; 

            const classes = courseData[courseName];
            if (classes) {
                classes.forEach((classData, index) => {
                    const classItem = document.createElement('div');
                    classItem.className = "class-card";
                    classItem.onclick = () => openVideo(index);
                    
                    classItem.innerHTML = `
                        <div class="class-icon">▶</div>
                        <div>
                            <div style="font-weight: bold; font-size: 1.1rem; margin-bottom: 3px;">${classData.title}</div>
                            <div style="font-size: 0.85rem; color: #888;">${classData.time} • ${classData.instructor}</div>
                        </div>
                    `;
                    classListContainer.appendChild(classItem);
                });
            }
        }

        // Course -> Video (FIXED)
        function openVideo(index) {
            const classInfo = courseData[currentCourse][index];
            const videoUrl = classInfo.url;

            // Check if the URL is a Google Meet link
            if (videoUrl.includes("meet.google.com")) {
                // This is the "Deep Link" - it forces the phone to open the Meet App
                window.open(videoUrl, '_blank'); 
                return; // Stop the code here so it doesn't open the blank video screen
            }

            // Original Logic: If it's a YouTube link, open it in the iframe normally
            history.pushState({ page: 'video' }, '', '#video');
            
            showScreen('video-screen');
            document.getElementById('playing-class-title').innerText = `${classInfo.title} (${classInfo.instructor})`;
            
            document.getElementById('youtube-player').src = videoUrl;
        }

        // On-screen Back Buttons just trigger the Browser Back event naturally
        function goBackToDashboard() {
            history.back();
        }

        function goBackToCourse() {
            history.back();
        }

        // The Magic Hardware Back Button Listener
        window.addEventListener('popstate', (event) => {
            // Always cut the video if we hit back
            document.getElementById('youtube-player').src = ""; 

            const state = event.state ? event.state.page : '';

            if (state === 'video') {
                showScreen('video-screen');
            } else if (state === 'course') {
                showScreen('course-screen');
            } else if (state === 'dashboard') {
                showScreen('dashboard-screen');
            } else {
                // If there's no state (root), default back based on auth
                if (localStorage.getItem('isLoggedIn') === 'true') {
                    showScreen('dashboard-screen');
                } else {
                    showScreen('login-screen');
                }
            }
        });
    </script>
</body>
</html>
